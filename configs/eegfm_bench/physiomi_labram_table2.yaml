# Table-2-style PhysioMI replication: full-parameter, single-task, avg_pool head.
seed: 42
master_port: 51232
multitask: false
model_type: labram
fs: 200

data:
  datasets:
    motor_mv_img: finetune
  batch_size: 128
  num_workers: 4

model:
  pretrained_path: /home/erimoldi/openclaw_remote/projects/eeg-spatial-paper/external/LaBraM/checkpoints/labram-base.pth
  eeg_size: 800
  patch_size: 200
  classifier_head:
    head_type: avg_pool
    hidden_dims: [128]
    dropout: 0.3

training:
  max_epochs: 50
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_schedule: cosine
  max_lr: 8.0e-4
  encoder_lr_scale: 0.1
  warmup_epochs: 5
  warmup_scale: 1.0e-2
  min_lr: 8.0e-6
  layer_decay: 0.9
  use_amp: true
  freeze_encoder: false
  label_smoothing: 0.1
  model_ema: false
  lora:
    use_lora: false

logging:
  experiment_name: labram_physiomi_table2
  run_dir: /home/erimoldi/openclaw_remote/projects/eeg-spatial-paper/results/eegfm_bench
  use_cloud: false
  cloud_backend: wandb
  project: labram
  tags: [eegfm-bench, physiomi, table2-style, full-parameter, single-task, avg-pool]
  log_step_interval: 1
  ckpt_interval: 5
