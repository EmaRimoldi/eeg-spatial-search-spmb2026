# Table-2-style BCIC-2a replication: full-parameter, single-task,
# officialish flatten-MLP head.
# Uses fs_200 because that is the local processed BCIC-2a cache available in this repo.
seed: 42
master_port: 51133
multitask: false
model_type: cbramod
fs: 200

data:
  datasets:
    bcic_2a: finetune
  batch_size: 128
  num_workers: 4

model:
  pretrained_path: /home/erimoldi/openclaw_remote/projects/eeg-spatial-paper/external/CBraMod/pretrained_weights/pretrained_weights.pth
  classifier_head:
    head_type: flatten_mlp
    dropout: 0.1

training:
  max_epochs: 50
  weight_decay: 0.05
  max_grad_norm: 1.0
  lr_schedule: cosine
  max_lr: 1.0e-4
  encoder_lr_scale: 0.1
  warmup_epochs: 5
  warmup_scale: 1.0e-2
  min_lr: 1.0e-6
  use_amp: true
  freeze_encoder: false
  lora:
    use_lora: false

logging:
  experiment_name: cbramod_bcic2a_table2
  run_dir: /home/erimoldi/openclaw_remote/projects/eeg-spatial-paper/results/eegfm_bench
  use_cloud: false
  cloud_backend: wandb
  project: cbramod
  tags: [eegfm-bench, bcic2a, table2-style, full-parameter, single-task, officialish, flatten-mlp]
  log_step_interval: 1
  ckpt_interval: 5
