# Table-2-style Workload replication: full-parameter, single-task, avg_pool head.
seed: 45
master_port: 55245
multitask: false
model_type: cbramod
fs: 200

data:
  datasets:
    workload: finetune
  batch_size: 128
  num_workers: 4

model:
  pretrained_path: /home/erimoldi/openclaw_remote/projects/eeg-spatial-paper/external/CBraMod/pretrained_weights/pretrained_weights.pth
  classifier_head:
    head_type: avg_pool
    hidden_dims: [128]
    dropout: 0.3

training:
  max_epochs: 50
  weight_decay: 0.05
  max_grad_norm: 1.0
  lr_schedule: cosine
  max_lr: 1.0e-4
  encoder_lr_scale: 0.1
  warmup_epochs: 5
  warmup_scale: 1.0e-2
  min_lr: 1.0e-6
  use_amp: true
  freeze_encoder: false
  lora:
    use_lora: false

logging:
  experiment_name: cbramod_workload_table2_seed45
  run_dir: /home/erimoldi/openclaw_remote/projects/eeg-spatial-paper/results/eegfm_bench
  use_cloud: false
  cloud_backend: wandb
  project: cbramod
  tags: [eegfm-bench, workload, table2-style, full-parameter, single-task, avg-pool]
  log_step_interval: 1
  ckpt_interval: 5
