# Cross-layout transfer experiment
# Stage 3: Test whether geometry helps under layout shift
#
# Setup:
#   - Train on one layout / dataset, evaluate on another
#   - Use 4 strongest spatial variants
#   - Measure degradation relative to same-layout evaluation

experiment:
  name: cross_layout
  stage: 3

model:
  backbone: reve
  checkpoint: huggingface
  embed_dim: 512
  freeze_policy: head_only
  injection_mode: replace

# Strongest 4 variants only (identified from core_ablation)
spatial_variants:
  - channel_id
  - coords3d
  - coords3d_reference
  - topology_agnostic

# Transfer conditions
transfer_conditions:
  - name: same_layout
    train_dataset: BNCI2014_001
    test_dataset: BNCI2014_001
    split: cross_subject

  - name: reduced_layout
    train_dataset: BNCI2014_001  # 22 channels
    test_dataset: BNCI2014_001
    test_channels_subset: [Fz, C3, Cz, C4, CPz, Pz]  # sparse subset

  - name: cross_dataset
    train_dataset: BNCI2014_001
    test_dataset: PhysionetMI
    # Different number of channels, different subjects

training:
  seeds: [42, 123, 456]
  epochs: 100
  batch_size: 32
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-4

evaluation:
  metrics: [accuracy, balanced_accuracy]
  report_degradation: true  # degrade relative to same_layout baseline

logging:
  run_dir: results/logs
  save_config: true
